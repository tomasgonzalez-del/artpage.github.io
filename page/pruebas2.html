<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar fondo</title>

<style>
body{
    margin:0;
    height:100vh;
    background-size:cover;
    background-position:center;
    transition: background-image 0.6s ease;
    font-family:Arial, Helvetica, sans-serif;
}

/* barra botones */
.menu{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.6);
    padding:12px;
    border-radius:14px;
    backdrop-filter: blur(6px);
}

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
}

/* flechas */
.flecha{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    background:rgba(255,255,255,0.5);
    padding:12px 18px;
    border-radius:50%;
    cursor:pointer;
    user-select:none;
    transition:0.2s;
}

.flecha:hover{
    background:rgba(255,255,255,0.9);
}

.izq{ left:20px; }
.der{ right:20px; }

</style>
</head>

<body id="pagina">

<div class="menu">
      <button onclick="cambiarFondo('object/image/intagram.png')">Bosque</button>
    <button onclick="cambiarFondo('object/image/mountain2.jpg')">Montaña</button>
    <button onclick="cambiarFondo('object/image/hill.jpg')">Playa</button>
    <button onclick="cambiarFondo('object/image/lisa.jpg')">Desierto</button>
</div>

<div class="flecha izq" onclick="anterior()">❮</div>
<div class="flecha der" onclick="siguiente()">❯</div>

<script src="js/pruebas2.js"></script>
</body>
</html>
