<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar Imagen</title>

<style>
    body{
        background:#1e1e1e;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        height:100vh;
        margin:0;
        gap:20px;
        font-family:sans-serif;
    }

    img{
        width:300px;
        height:200px;
        object-fit:cover;
        border-radius:15px;
        box-shadow:0 0 20px rgba(0,0,0,0.5);
        transition:0.3s;
    }

    button{
        padding:10px 20px;
        font-size:16px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        background:#00c6ff;
        color:white;
    }

    button:hover{
        background:#0094cc;
    }
</style>
</head>
<body>

<img id="imagen" src="https://picsum.photos/300/200?random=1">

<button onclick="cambiarImagen()">Cambiar Imagen</button>

<script>
    let contador = 1;

    function cambiarImagen(){
        contador++;
        if(contador > 3){
            contador = 1;
        }

        document.getElementById("imagen").src =
            "https://picsum.photos/300/200?random=" + contador;
    }
</script>

</body>
</html>
